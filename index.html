<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anomali Imup | Secure Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Ring Loader */
        .loader-ring {
            width: 100px;
            height: 100px;
            border: 8px solid #fff5f8;
            border-top: 8px solid #ec4899;
            border-radius: 50%;
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Pulse Text */
        .secure-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Background Pattern */
        .bg-dots {
            background-image: radial-gradient(#ffd6e5 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-dots">

    <div class="relative flex items-center justify-center mb-10">
        <div class="loader-ring shadow-2xl shadow-pink-200"></div>
        <i class="fa-solid fa-shield-halved absolute text-pink-500 text-2xl"></i>
    </div>

    <div class="text-center">
        <h2 class="text-[12px] font-black tracking-[0.8em] uppercase text-pink-600 mb-3">
            Anomali Security
        </h2>
        <div class="flex flex-col items-center gap-1">
            <p id="status-text" class="text-[10px] font-bold text-gray-500 italic secure-pulse">
                Initializing encrypted link...
            </p>
            <div class="w-48 h-1 bg-gray-100 rounded-full mt-4 overflow-hidden">
                <div id="progress-bar" class="h-full bg-pink-500 transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-10 text-[8px] font-black text-gray-300 uppercase tracking-widest">
        Authorized Access Only
    </div>

    <script>
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        
        const sequence = [
            { text: "Scanning Device ID...", progress: "25%" },
            { text: "Verifying Session Token...", progress: "50%" },
            { text: "Bypassing Firewall...", progress: "75%" },
            { text: "Access Granted. Redirecting...", progress: "100%" }
        ];

        let step = 0;

        // Animasi teks dan progress bar
        const interval = setInterval(() => {
            if (step < sequence.length) {
                statusText.innerText = sequence[step].text;
                progressBar.style.width = sequence[step].progress;
                step++;
            } else {
                clearInterval(interval);
                // Redirect ke file dashboard.html
                window.location.href = "dashboard";
            }
        }, 800);
    </script>
</body>
</html>
